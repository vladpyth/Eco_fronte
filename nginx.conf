server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API Spring Boot — иначе /api/* попадает в SPA и браузер получает index.html вместо JSON
    # Вариант A: бэкенд опубликован на хосте на порту 8080 (типично eco_service на :8080)
    location /api {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Вариант B (если фронт и бэк в одной docker-сети): закомментируйте блок выше и раскомментируйте,
    # подставьте имя сервиса из docker-compose бэкенда (например app:8080):
    # location /api {
    #     proxy_pass http://app:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
